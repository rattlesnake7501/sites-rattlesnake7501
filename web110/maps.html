	<h3 id="txt"> Hover over a room to get more infomation.</h3> <h4>Second Floor</h4>	
				
	<!-- this is the image to be used for mapping different areas -->
	<img src="images/Floor A2.JPG" class="" alt="Floor A2" usemap="#roommap" />
	
	<!-- within the mapping area are the individual mapped coordinates -->
	<map name="roommap">
		<!-- Rectangle -->
		<area shape="rect" coords="426,56,643,132" onmouseover="writetext('Wendys Room')" onmouseleave="writetext('Hover over a room to get more infomation.')" alt="wendy" />
